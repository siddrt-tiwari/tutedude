<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            width: 600px;
            margin: 50px auto;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            margin-bottom: 20px;
        }

    </style>

</head>

<body>

<h1>User Feedback Form</h1>

{% if success_message %}
<div class="success">
    {{ success_message }}
</div>
{% endif %}

<form method="POST">

    <label>Name</label>

    <input
        type="text"
        name="name"
        required
    >

    <label>Email</label>

    <input
        type="email"
        name="email"
        required
    >

    <label>Message</label>

    <textarea
        name="message"
        rows="5"
        required
    ></textarea>

    <button type="submit">
        Submit
    </button>

</form>

</body>
</html>
